<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h3 class="mb-0">Suppliers</h3>

    <button class="btn btn-primary" type="button" (click)="createSupplier()">
      New Supplier
    </button>
  </div>

  <div class="card-body">
    <table class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>Name</th>
          <th>Contact Person</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Address</th>
          <th>Active</th>
          <th style="width: 180px">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of suppliers.items">
          <td>{{ item.name }}</td>
          <td>{{ item.contactPerson }}</td>
          <td>{{ item.phone }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.address }}</td>
          <td>{{ item.isActive ? 'Yes' : 'No' }}</td>
          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="editSupplier(item.id)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="delete(item.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h4>{{ selectedSupplier.id ? 'Edit Supplier' : 'New Supplier' }}</h4>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" formControlName="name" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Contact Person</label>
          <input type="text" class="form-control" formControlName="contactPerson" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" formControlName="phone" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label">Address</label>
          <textarea class="form-control" formControlName="address" rows="3"></textarea>
        </div>

        <div class="col-md-12">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              formControlName="isActive"
              id="supplierIsActive"
            />
            <label class="form-check-label" for="supplierIsActive">
              Active
            </label>
          </div>
        </div>
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button class="btn btn-secondary" abpClose>
      Cancel
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form?.invalid">
      Save
    </button>
  </ng-template>
</abp-modal>
